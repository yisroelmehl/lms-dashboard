<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="50%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8a6118"/>
    </linearGradient>
  </defs>

  <!-- Open book with hand -->
  <g transform="translate(150, 120)">
    <path d="M -75,-10 Q -75,-45 -55,-50 Q -30,-55 -5,-45 L -5,35 Q -30,25 -55,30 Q -75,33 -75,-10 Z"
          fill="url(#gold)" stroke="#8a6118" stroke-width="1.5"/>
    <path d="M 75,-10 Q 75,-45 55,-50 Q 30,-55 5,-45 L 5,35 Q 30,25 55,30 Q 75,33 75,-10 Z"
          fill="url(#gold)" stroke="#8a6118" stroke-width="1.5"/>

    <g stroke="#8a6118" stroke-width="0.8" fill="none" opacity="0.4">
      <path d="M -65,-30 Q -40,-35 -15,-30"/>
      <path d="M -65,-20 Q -40,-25 -15,-20"/>
      <path d="M -65,-10 Q -40,-15 -15,-10"/>
      <path d="M -65,0 Q -40,-5 -15,0"/>
      <path d="M -65,10 Q -40,5 -15,10"/>
    </g>
    <g stroke="#8a6118" stroke-width="0.8" fill="none" opacity="0.4">
      <path d="M 65,-30 Q 40,-35 15,-30"/>
      <path d="M 65,-20 Q 40,-25 15,-20"/>
      <path d="M 65,-10 Q 40,-15 15,-10"/>
      <path d="M 65,0 Q 40,-5 15,0"/>
      <path d="M 65,10 Q 40,5 15,10"/>
    </g>

    <g>
      <path d="M -5,-45 Q -5,-55 0,-55 Q 5,-55 5,-45 L 5,10 Q 8,15 12,15 L 18,10 Q 22,13 22,22 L 22,35 Q 22,45 12,48 L -12,48 Q -22,45 -22,35 L -22,25 Q -20,18 -15,18 L -5,20 Z"
            fill="url(#gold)" stroke="#8a6118" stroke-width="1.5"/>
    </g>
  </g>

  <text x="150" y="225" text-anchor="middle" fill="#b8860b" direction="rtl" unicode-bidi="bidi-override"
        font-family="Noto Serif Hebrew, David Libre, serif" font-size="32" font-weight="900">
    ודמלי ןעמל
  </text>

  <line x1="70" y1="245" x2="230" y2="245" stroke="#b8860b" stroke-width="1"/>

  <text x="150" y="265" text-anchor="middle" fill="#b8860b" direction="rtl" unicode-bidi="bidi-override"
        font-family="Noto Serif Hebrew, serif" font-size="16" font-weight="500">
    הארוהל הללכמה
  </text>
</svg>
