<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <linearGradient id="bookBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b0a0a"/>
      <stop offset="50%" stop-color="#5a0606"/>
      <stop offset="100%" stop-color="#3a0404"/>
    </linearGradient>
    <linearGradient id="spineBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a0606"/>
      <stop offset="100%" stop-color="#2a0202"/>
    </linearGradient>
    <linearGradient id="plaqueBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0505"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="4" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="leather" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="transparent"/>
      <circle cx="2" cy="2" r="0.4" fill="rgba(0,0,0,0.22)"/>
      <circle cx="6" cy="5" r="0.3" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>

  <!-- Book body -->
  <g filter="url(#shadow)">
    <!-- Spine -->
    <rect x="40" y="30" width="44" height="460" fill="url(#spineBg)" rx="2"/>
    <rect x="40" y="30" width="44" height="460" fill="url(#leather)" rx="2"/>
    <!-- Cover -->
    <rect x="84" y="24" width="280" height="472" fill="url(#bookBg)" rx="3"/>
    <rect x="84" y="24" width="280" height="472" fill="url(#leather)" rx="3"/>
    <!-- Gold outer frame on cover -->
    <rect x="100" y="40" width="248" height="440" fill="none" stroke="#d4a84a" stroke-width="1.5"/>
    <rect x="108" y="48" width="232" height="424" fill="none" stroke="#b8860b" stroke-width="0.8"/>

    <!-- Central plaque on cover -->
    <g transform="translate(224, 180)">
      <!-- Ornate shield -->
      <path d="M-90,-70 Q-90,-80 -80,-80 L80,-80 Q90,-80 90,-70 L90,60 Q90,75 75,80 L0,95 L-75,80 Q-90,75 -90,60 Z"
            fill="url(#plaqueBg)" stroke="#d4a84a" stroke-width="2"/>
      <path d="M-82,-62 Q-82,-72 -72,-72 L72,-72 Q82,-72 82,-62 L82,55 Q82,68 70,72 L0,86 L-70,72 Q-82,68 -82,55 Z"
            fill="none" stroke="#b8860b" stroke-width="0.6"/>
      <!-- Title text (Hebrew chars reversed for SVG LTR rendering) -->
      <text x="0" y="-30" text-anchor="middle" fill="#d4a84a" direction="rtl" unicode-bidi="bidi-override"
            font-family="Noto Serif Hebrew, David Libre, serif" font-size="22" font-weight="800">רוט</text>
      <text x="0" y="0" text-anchor="middle" fill="#d4a84a" direction="rtl" unicode-bidi="bidi-override"
            font-family="Noto Serif Hebrew, David Libre, serif" font-size="22" font-weight="800">ךורע ןחלשו</text>
      <text x="0" y="30" text-anchor="middle" fill="#e8c97a" direction="rtl" unicode-bidi="bidi-override"
            font-family="Noto Serif Hebrew, David Libre, serif" font-size="14" font-weight="600">תבש תוכלה</text>
      <text x="0" y="68" text-anchor="middle" fill="#b8860b"
            font-family="Noto Serif Hebrew, David Libre, serif" font-size="9">✦ ✦ ✦</text>
    </g>

    <!-- Lower decorative band -->
    <rect x="108" y="330" width="232" height="60" fill="#1a0505" stroke="#b8860b" stroke-width="0.8"/>
    <g transform="translate(224, 360)">
      <text x="0" y="0" text-anchor="middle" fill="#d4a84a" direction="rtl" unicode-bidi="bidi-override"
            font-family="Noto Serif Hebrew, serif" font-size="10" font-weight="600">אכש – אש םינמיס</text>
      <text x="0" y="16" text-anchor="middle" fill="#a87428" direction="rtl" unicode-bidi="bidi-override"
            font-family="Noto Serif Hebrew, serif" font-size="8">םיניע תריאמ הרודהמ</text>
    </g>

    <!-- Bottom ornament -->
    <g transform="translate(224, 430)">
      <text x="0" y="0" text-anchor="middle" fill="#b8860b"
            font-family="serif" font-size="16">❦ ✦ ❦</text>
    </g>
  </g>

  <!-- Page edges (gold) -->
  <rect x="362" y="28" width="4" height="466" fill="#d4a84a" opacity="0.85"/>
  <rect x="362" y="28" width="2" height="466" fill="#e8c97a"/>
</svg>
